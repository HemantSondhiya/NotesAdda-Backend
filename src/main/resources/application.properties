spring.application.name=NotsHub

# Server Configuration
server.port=${SERVER_PORT:${PORT:5000}}
server.servlet.context-path=/
server.compression.enabled=true
server.compression.min-response-size=1024
server.shutdown=graceful
spring.lifecycle.timeout-per-shutdown-phase=30s

# Database Configuration
spring.datasource.url=${DB_URL:jdbc:mysql://localhost:3306/notshub}
spring.datasource.username=${DB_USERNAME:root}
spring.datasource.password=${DB_PASSWORD:}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JPA Configuration
spring.jpa.hibernate.ddl-auto=${HIBERNATE_DDL:validate}
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.open-in-view=false

# JWT Configuration - Use Environment Variables
spring.app.jwtSecret=${JWT_SECRET}
spring.app.jwtExpirationMs=${JWT_EXPIRATION:86400000}
spring.ecom.app.jwtCookieName=${JWT_COOKIE_NAME:notshub_session}

# HTTPS/SSL Configuration
server.ssl.enabled=${SSL_ENABLED:false}
server.ssl.key-store=${SSL_KEYSTORE_PATH:}
server.ssl.key-store-password=${SSL_KEYSTORE_PASSWORD:}
server.ssl.key-store-type=PKCS12

# Frontend URL
frontend.url=${FRONTEND_URL:}
frontend.allowed-origins=${FRONTEND_ALLOWED_ORIGINS:}

## Logging Configuration - Production Level
logging.level.root=${LOG_LEVEL_ROOT:WARN}
logging.level.com.example.NotsHub=${LOG_LEVEL_APP:INFO}
logging.level.org.springframework.security=${LOG_LEVEL_SECURITY:WARN}
logging.file.name=${LOG_FILE_PATH:logs/application.log}
logging.logback.rollingpolicy.max-file-size=${LOG_MAX_SIZE:10MB}
logging.logback.rollingpolicy.max-history=${LOG_MAX_HISTORY:30}

# Connection Pool Configuration
spring.datasource.hikari.maximum-pool-size=10
spring.datasource.hikari.minimum-idle=5
spring.datasource.hikari.idle-timeout=600000
spring.datasource.hikari.max-lifetime=1800000

# File Upload Limits
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB

# Actuator Monitoring
management.endpoints.web.base-path=/actuator
management.endpoints.web.exposure.include=health,info,metrics,prometheus
management.endpoint.health.show-details=when_authorized
management.endpoint.health.probes.enabled=true
app.security.expose-dev-endpoints=${EXPOSE_DEV_ENDPOINTS:false}
app.security.trust-forward-headers=${TRUST_FORWARD_HEADERS:true}
app.security.rate-limit.enabled=${RATE_LIMIT_ENABLED:true}

# Flyway Migrations
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration
spring.flyway.baseline-on-migrate=true
spring.flyway.validate-on-migrate=true

# AWS S3 Configuration
aws.region=${AWS_REGION:us-east-1}
aws.s3.bucket=${AWS_S3_BUCKET:}
aws.s3.presigned-expiry-minutes=${AWS_S3_PRESIGNED_EXPIRY_MINUTES:5}
aws.cdn.base-url=${AWS_CDN_BASE_URL}

# Email OTP Configuration
app.email.from=${MAIL_FROM:}
app.email.otp.expiry-minutes=${EMAIL_OTP_EXPIRY_MINUTES:10}
app.email.otp.max-attempts=${EMAIL_OTP_MAX_ATTEMPTS:5}
app.email.otp.resend-cooldown-seconds=${EMAIL_OTP_RESEND_COOLDOWN_SECONDS:60}
app.email.otp.log-only=${EMAIL_OTP_LOG_ONLY:false}

# Password Reset Configuration
app.password-reset.expiry-minutes=${PASSWORD_RESET_EXPIRY_MINUTES:10}
spring.mail.host=${MAIL_HOST:}
spring.mail.port=${MAIL_PORT:587}
spring.mail.username=${MAIL_USERNAME:}
spring.mail.password=${MAIL_PASSWORD:}
spring.mail.properties.mail.smtp.auth=${MAIL_SMTP_AUTH:true}
spring.mail.properties.mail.smtp.starttls.enable=${MAIL_SMTP_STARTTLS_ENABLE:true}

# Swagger/OpenAPI Configuration
springdoc.api-docs.enabled=${ENABLE_SWAGGER:false}
springdoc.swagger-ui.enabled=${ENABLE_SWAGGER:false}
